name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-arm64:
    name: Build arm64-v8a APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Ella
        uses: actions/checkout@v4

      - name: Checkout Miuix
        uses: actions/checkout@v4
        with:
          repository: compose-miuix-ui/miuix
          path: external/miuix

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APK
        env:
          MIUIX_INCLUDED_BUILD_PATH: ${{ github.workspace }}/external/miuix
        run: ./gradlew :app:assembleRelease -PellaAbi=arm64-v8a --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ella-arm64-v8a-${{ github.sha }}
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: error
